name: BrowserSwitch
options:
  bundleIdPrefix: com.kristoffer
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  BrowserSwitch:
    type: application
    platform: macOS
    sources:
      - path: BrowserSwitch
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kristoffer.BrowserSwitch
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: BrowserSwitch/Info.plist
        CODE_SIGN_ENTITLEMENTS: BrowserSwitch/BrowserSwitch.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  browserswitch:
    type: tool
    platform: macOS
    sources:
      - path: browserswitch-cli
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kristoffer.browserswitch
        INSTALL_PATH: /usr/local/bin
